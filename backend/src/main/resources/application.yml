spring:
  datasource:
    # XAMPP / MySQL Configuration
    url: ${DATABASE_URL:jdbc:mysql://localhost:3307/vitrineclick?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    
    # Hibernate settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


app:
  jwt:
    secret: 9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
    expiration: 86400000 # 24 hours

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5000}
    
server:
  port: 8081
  error:
    include-message: always
